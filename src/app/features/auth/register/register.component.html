<div class="text-slate-800">
    @if (showEmailStep) {
    <div class="mb-8">
        <h1 class="text-[28px] font-semibold leading-tight text-slate-800">Create Account</h1>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmitEmail()" class="space-y-5">
        <div>
            <label for="register-email" class="mb-1 block text-[11px] font-medium text-slate-700">Email</label>
            <input id="register-email" type="email" formControlName="email" placeholder="user@example.com"
                class="h-10 w-full border border-slate-200 bg-white px-3 text-sm text-slate-800 outline-none placeholder:text-slate-300 focus:border-blue-500"
                [class.border-red-400]="shouldShowEmailError" />
            <app-input-error-message [show]="shouldShowEmailError" message="A valid email is required" />
        </div>

        <app-auth-button type="submit" label="Next" iconClass="fa-solid fa-chevron-right" />

        <p class="pt-1 text-center text-sm text-slate-500">
            Already have an account?
            <a routerLink="/login" class="font-semibold text-blue-600 transition hover:text-blue-700">Login</a>
        </p>
    </form>
    }

    @if (showOtpStep) {
    <app-auth-stepper class="mb-6 block" [steps]="4" [activeStep]="2" />

    <div class="mb-7">
        <h1 class="text-[28px] font-semibold leading-tight text-slate-800">Create Account</h1>
        <p class="mt-1 text-sm font-semibold text-blue-700">Verify OTP</p>
        <p class="mt-2 text-sm text-slate-500">
            Please enter the 6-digit code we have sent to:
            <span class="font-semibold text-slate-700">{{ enteredEmail }}</span>
            <button type="button" (click)="goBackToEmailStep()"
                class="font-semibold text-blue-600 transition hover:text-blue-700">Edit</button>
        </p>
    </div>

    <form [formGroup]="otpForm" (ngSubmit)="onSubmitOtp()" class="space-y-6">
        <div class="flex items-center justify-between gap-2 sm:justify-center">
            @for (control of otpControls; track $index) {
            <input [id]="'otp-' + ($index + 1)" type="text" inputmode="numeric" maxlength="1" [value]="control.value"
                (input)="onDigitInput($index, $event)" (keydown)="onDigitKeydown($index, $event)"
                class="h-10 w-10 border border-slate-200 bg-white text-center text-base font-medium text-slate-800 outline-none focus:border-blue-500 sm:h-11 sm:w-11"
                [class.border-red-400]="shouldShowOtpError" />
            }
        </div>

        <p class="text-center text-sm text-slate-500">
            You can request another code in {{ countdownText }}
        </p>

        <app-input-error-message [show]="shouldShowOtpError" message="Please enter a valid 6-digit code"
            [centered]="true" />

        <app-auth-button type="submit" label="Verify Code" />

        <button type="button" (click)="requestNewCode()" [disabled]="secondsLeft > 0"
            class="block w-full text-center text-sm font-medium text-blue-600 transition hover:text-blue-700 disabled:cursor-not-allowed disabled:text-slate-400">
            Resend code
        </button>
    </form>
    }
</div>
