<div class="text-slate-800">
    <app-auth-stepper class="mb-6 block" [steps]="4" [activeStep]="4" />

    <div class="mb-7">
        <h1 class="text-[28px] font-semibold leading-tight text-slate-800">Create a New Password</h1>
        <p class="mt-2 max-w-md text-sm text-slate-500">Create a new strong password for your account.</p>
    </div>

    <form [formGroup]="createPasswordForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
            <label for="newPassword" class="mb-1 block text-[11px] font-medium text-slate-700">New Password</label>
            <div class="relative">
                <input id="newPassword" [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword"
                    placeholder="••••••••"
                    class="h-10 w-full border-b border-slate-200 bg-transparent px-0 pr-9 text-sm text-slate-800 outline-none placeholder:text-slate-300 focus:border-blue-500"
                    [class.border-red-400]="shouldShowNewPasswordError" />
                <button type="button" (click)="toggleNewPasswordVisibility()"
                    class="absolute right-0 top-1/2 -translate-y-1/2 text-slate-400 transition hover:text-slate-600"
                    aria-label="Toggle new password visibility">
                    <i class="fa-regular" [class.fa-eye]="!showNewPassword" [class.fa-eye-slash]="showNewPassword"></i>
                </button>
            </div>
            <app-input-error-message [show]="shouldShowNewPasswordError" message="New password is required" />
        </div>

        <div>
            <label for="confirmPassword" class="mb-1 block text-[11px] font-medium text-slate-700">Confirm New
                Password</label>
            <div class="relative">
                <input id="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'"
                    formControlName="confirmPassword" placeholder="••••••••"
                    class="h-10 w-full border-b border-slate-200 bg-transparent px-0 pr-9 text-sm text-slate-800 outline-none placeholder:text-slate-300 focus:border-blue-500"
                    [class.border-red-400]="shouldShowConfirmPasswordError || passwordsDoNotMatch" />
                <button type="button" (click)="toggleConfirmPasswordVisibility()"
                    class="absolute right-0 top-1/2 -translate-y-1/2 text-slate-400 transition hover:text-slate-600"
                    aria-label="Toggle confirm password visibility">
                    <i class="fa-regular" [class.fa-eye]="!showConfirmPassword"
                        [class.fa-eye-slash]="showConfirmPassword"></i>
                </button>
            </div>
            <app-input-error-message [show]="shouldShowConfirmPasswordError"
                message="Confirmation password is required" />
            <app-input-error-message [show]="!shouldShowConfirmPasswordError && passwordsDoNotMatch"
                message="Passwords do not match" />
        </div>

        <app-auth-button type="submit" label="Reset Password" />

        <p class="pt-1 text-center text-sm text-slate-500">
            Don't have an account?
            <a routerLink="/register" class="font-semibold text-blue-600 transition hover:text-blue-700">Create
                yours</a>
        </p>
    </form>
</div>
