<section class="page-section">
    <p class="crumb">Diplomas / Frontend Development / <span>CSS Exam</span></p>

    <div class="panel">
        <div class="panel-head">
            <a class="back-btn" [routerLink]="['/diplomas', 'frontend', 'exams']"><i
                    class="fa-solid fa-chevron-left"></i></a>
            <h2 class="panel-title"><i class="fa-regular fa-circle-question"></i> CSS Exam Questions</h2>
        </div>

        <div class="question-toolbar">
            <div class="question-path">Frontend Development - <span>CSS Quiz</span></div>

            <div class="question-stats">
                <span>Question <strong>{{ currentQuestionIndex }}</strong> of {{ totalQuestions }}</span>
                <div class="timer-ring"
                    [style.background]="'conic-gradient(#2563eb ' + timerProgress + '%, #d8e0ef 0)'">
                    <div class="timer-ring-inner">{{ timerDisplay }}</div>
                </div>
            </div>
        </div>

        <div class="question-progress">
            <div class="question-progress-bar" [style.width]="progressWidth"></div>
        </div>

        <div class="question-card">
            <h3>{{ question.text }}</h3>

            <div class="answers-grid">
                @for (option of question.options; track option; let index = $index) {
                <label class="answer-row" [class.answer-row-selected]="selectedAnswer === option">
                    <input type="radio" name="answer" [value]="option" [(ngModel)]="selectedAnswer" />
                    <span>{{ option }}</span>
                </label>
                }
            </div>

            <div class="question-actions">
                <button type="button" class="btn-secondary" disabled>
                    <i class="fa-solid fa-chevron-left"></i> Previous
                </button>
                <button type="button" class="btn-primary" [disabled]="!selectedAnswer" (click)="submitAndNext()">
                    Next <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</section>
