<section class="page-section">
    <p class="crumb">Diplomas</p>

    <div class="panel">
        <h2 class="panel-title"><i class="fa-solid fa-graduation-cap"></i> Diplomas</h2>

        <div class="diploma-grid">
            @for (diploma of diplomasList; track diploma.id; let i = $index) {
            <a class="diploma-card" [class]="'diploma-card ' + getThemeClass(i)"
                [routerLink]="['/diplomas', diploma.id, 'exams']"
                [style.background-image]="'url(' + (diploma.image || '/assets/default-diploma.jpg') + ')'">
                <div class="card-badge">{{ diploma.title?.slice(0,1) }}</div>
                <div class="diploma-overlay"></div>

                <div class="diploma-info">
                    <div class="title-row">
                        <h3 class="diploma-title">{{ diploma.title }}</h3>
                    </div>
                    <p class="diploma-desc">{{ diploma.description }}</p>
                </div>
            </a>
            }
        </div>

        <p class="scroll-hint">Scroll to view more <i class="fa-solid fa-angle-down"></i></p>
    </div>
</section>
