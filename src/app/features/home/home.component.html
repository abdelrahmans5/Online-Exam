<section class="page-section">
    <p class="crumb">Diplomas</p>

    <div class="panel">
        <h2 class="panel-title"><i class="fa-solid fa-graduation-cap"></i> Diplomas</h2>

        <div class="diploma-grid">
            @for (diploma of diplomas; track diploma.id) {
            <a class="diploma-card" [class]="'diploma-card ' + diploma.theme"
                [routerLink]="['/diplomas', diploma.id, 'exams']">
                <div class="diploma-overlay"></div>
                <div class="diploma-info">
                    <h3>{{ diploma.title }}</h3>
                    <p>{{ diploma.description }}</p>
                </div>
            </a>
            }
        </div>

        <p class="scroll-hint">Scroll to view more <i class="fa-solid fa-angle-down"></i></p>
    </div>
</section>
