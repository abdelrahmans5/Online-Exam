<div class="rounded-sm border border-sky-100 bg-white">
    <div class="border-b border-sky-100 px-6 py-5">
        <h1 class="text-4xl font-bold text-slate-800">Login</h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4 px-6 py-5">
        <div>
            <label for="username" class="mb-1 block text-sm font-semibold text-slate-700">Username</label>
            <input id="username" type="text" formControlName="username" placeholder="user123"
                class="w-full rounded-none border px-3 py-2 text-sm text-slate-700 outline-none"
                [class.border-red-300]="shouldShowUsernameError" [class.focus:border-red-400]="shouldShowUsernameError"
                [class.border-slate-300]="!shouldShowUsernameError"
                [class.focus:border-blue-500]="!shouldShowUsernameError" />
            @if (shouldShowUsernameError) {
            <p class="mt-1 text-sm font-semibold text-red-400">Your username is required</p>
            }
        </div>

        <div>
            <label for="password" class="mb-1 block text-sm font-semibold text-slate-700">Password</label>
            <div class="relative">
                <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                    placeholder="••••••••"
                    class="w-full rounded-none border px-3 py-2 pr-10 text-sm text-slate-700 outline-none"
                    [class.border-red-300]="shouldShowPasswordError"
                    [class.focus:border-red-400]="shouldShowPasswordError"
                    [class.border-slate-300]="!shouldShowPasswordError"
                    [class.focus:border-blue-500]="!shouldShowPasswordError" />
                <button type="button" (click)="togglePasswordVisibility()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 transition hover:text-slate-600"
                    aria-label="Toggle password visibility">
                    <i class="fa-regular" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
                </button>
            </div>
            @if (shouldShowPasswordError) {
            <p class="mt-1 text-sm font-semibold text-red-400">Your password is required</p>
            }
        </div>

        <div class="flex justify-end">
            <a href="/forget-password" class="text-sm font-semibold text-blue-600 transition hover:text-blue-700">
                Forgot your password?
            </a>
        </div>

        @if (shouldShowFormError) {
        <div
            class="flex items-center justify-center gap-2 border border-red-300 bg-red-50 px-3 py-2 text-sm font-semibold text-red-400">
            <i class="fa-regular fa-circle-xmark"></i>
            Something went wrong
        </div>
        }

        <button type="submit"
            class="mt-2 inline-flex w-full items-center justify-center rounded-none bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">
            Login
        </button>

        <p class="pt-2 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="/register" class="font-semibold text-blue-600 transition hover:text-blue-700">Create yours</a>
        </p>
    </form>
</div>
