<div class="rounded-sm border border-sky-100 bg-white">
    <div class="border-b border-sky-100 px-6 py-5">
        <h1 class="text-4xl font-bold text-slate-800">Verify OTP</h1>
        <p class="mt-2 text-sm text-slate-500">Enter the 6 digits code we have sent to user@example.com.</p>
    </div>

    <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-4 px-6 py-5">
        <div class="flex items-center justify-center gap-2">
            @for (control of otpControls; track $index) {
            <input [id]="'otp-' + ($index + 1)" type="text" inputmode="numeric" maxlength="1" [value]="control.value"
                (input)="onDigitInput($index, $event)" (keydown)="onDigitKeydown($index, $event)"
                class="h-11 w-11 rounded-none border text-center text-lg font-semibold text-slate-700 outline-none"
                [class.border-red-300]="shouldShowOtpError" [class.focus:border-red-400]="shouldShowOtpError"
                [class.border-slate-300]="!shouldShowOtpError" [class.focus:border-blue-500]="!shouldShowOtpError" />
            }
        </div>

        <p class="text-center text-sm text-slate-500">
            You can request another code in {{ countdownText }}
        </p>

        @if (shouldShowOtpError) {
        <p class="text-center text-sm font-semibold text-red-400">Please enter a valid 6-digit code</p>
        }

        <button type="submit"
            class="mt-2 inline-flex w-full items-center justify-center rounded-none bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">
            Verify Code
        </button>

        <button type="button" (click)="requestNewCode()" [disabled]="secondsLeft > 0"
            class="block w-full text-center text-sm font-semibold text-blue-600 transition hover:text-blue-700 disabled:cursor-not-allowed disabled:text-slate-400">
            Resend code
        </button>

        <p class="pt-2 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="/register" class="font-semibold text-blue-600 transition hover:text-blue-700">Create yours</a>
        </p>
    </form>
</div>
