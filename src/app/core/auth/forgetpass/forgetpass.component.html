<div class="rounded-sm border border-sky-100 bg-white">
    <div class="border-b border-sky-100 px-6 py-5">
        <h1 class="text-4xl font-bold text-slate-800">Forgot Password</h1>
        <p class="mt-2 text-sm text-slate-500">Don't worry, we will help you recover your account.</p>
    </div>

    <form [formGroup]="forgetPasswordForm" (ngSubmit)="onSubmit()" class="space-y-4 px-6 py-5">
        <div>
            <label for="email" class="mb-1 block text-sm font-semibold text-slate-700">Email</label>
            <input id="email" type="email" formControlName="email" placeholder="user@example.com"
                class="w-full rounded-none border px-3 py-2 text-sm text-slate-700 outline-none"
                [class.border-red-300]="shouldShowEmailError" [class.focus:border-red-400]="shouldShowEmailError"
                [class.border-slate-300]="!shouldShowEmailError"
                [class.focus:border-blue-500]="!shouldShowEmailError" />
            @if (shouldShowEmailError) {
            <p class="mt-1 text-sm font-semibold text-red-400">A valid email is required</p>
            }
        </div>

        <button type="submit"
            class="mt-2 inline-flex w-full items-center justify-center gap-2 rounded-none bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">
            Continue
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <p class="pt-2 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="/register" class="font-semibold text-blue-600 transition hover:text-blue-700">Create yours</a>
        </p>
    </form>
</div>
