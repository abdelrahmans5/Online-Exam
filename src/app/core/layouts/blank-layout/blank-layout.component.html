<div class="app-shell">
    <aside class="shell-sidebar">
        <header class="brand-block">
            <h1 class="brand">ELEVATE</h1>
            <p class="brand-subtitle">Exam App</p>
        </header>

        <nav class="shell-nav">
            @for (item of mainLinks; track item.label) {
            <a class="nav-link" [routerLink]="item.route" routerLinkActive="nav-link-active"
                [routerLinkActiveOptions]="{ exact: item.route === '/account' }">
                <i class="fa-solid" [class.fa-graduation-cap]="item.route === '/diplomas'"
                    [class.fa-user-gear]="item.route === '/account'"></i>
                <span>{{ item.label }}</span>
            </a>
            }
        </nav>

        <footer class="sidebar-footer">
            <div class="user-chip">
                <span class="avatar"></span>
                <div>
                    <p class="user-name">{{ user().firstName }}</p>
                    <p class="user-email">{{ user().email.slice(0, 20) }}...</p>
                </div>
                <div class="dropdown-wrapper">
                    <button class="more-icon-btn" (click)="toggleUserDropdown()" type="button" aria-label="User menu">
                        <i class="fa-solid fa-ellipsis-vertical more-icon"></i>
                    </button>

                    @if (showUserDropdown()) {
                    <div class="dropdown-menu">
                        <a routerLink="/account" class="dropdown-item" (click)="closeDropdown()">
                            <i class="fa-solid fa-user"></i>
                            <span>Account</span>
                        </a>
                        <button class="dropdown-item logout-item" (click)="logout()" type="button">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                    }
                </div>
            </div>
        </footer>
    </aside>

    <main class="shell-content">
        <router-outlet></router-outlet>
    </main>
</div>
