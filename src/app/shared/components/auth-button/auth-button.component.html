<button [type]="type()" [disabled]="disabled()"
    class="mt-2 inline-flex w-full items-center justify-center gap-2 rounded-none bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-blue-300">
    {{ label() }}
    @if (iconClass()) {
    <i [class]="iconClass()"></i>
    }
</button>
